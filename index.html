<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Powtórka do ustnego</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700..900;1,9..144,700..900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>powtórka<br /><span class="h1-accent">do ustnego</span></h1>
      <p class="header-sub">Kliknij jedną kartę, żeby wylosować pytanie.</p>
      <a
        class="cke-link"
        href="https://cke.gov.pl/images/_EGZAMIN_MATURALNY_OD_2023/komunikaty/2025_2026/J%C4%98ZYK%20POLSKI_Zadania%20jawne%20na%202026%20r._2027%20r.%20i%202028%20r.%20_KOMUNIKAT.pdf"
        target="_blank"
        rel="noopener noreferrer"
      ><i class="ti ti-file-type-pdf"></i> Oficjalna lista pytań CKE</a>
    </div>
  </header>

  <main>

    <!-- Phase 1: pick a card -->
    <section id="phase-pick">
      <div class="pick-toolbar">
        <button id="btn-reset-deck" class="btn-ghost" type="button">
          <i class="ti ti-arrows-shuffle"></i> resetuj talię
        </button>
      </div>
      <div id="cards-grid"></div>
    </section>

    <!-- Phase 2: rendered dynamically by answer-phase.js -->
    <section id="phase-answer" hidden></section>

  </main>

  <!-- GDPR/UODO storage notice -->
  <div id="cookie-banner" class="cookie-banner" hidden></div>

  <script src="questions.js"></script>
  <script src="utils.js"></script>
  <script src="cards.js"></script>
  <script src="answer-phase.js"></script>
  <script src="cookie-banner.js"></script>
  <script src="app.js"></script>
</body>
</html>
